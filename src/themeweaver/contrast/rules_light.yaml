---
# Spyder UI contrast rules - Light mode
# Source: Spyder UI color contrast guide (parsed from CSV)
_default_tolerance: 0.2
# PE1 removed: redundant with PE5A/B/C fg_bg_min (9 > 7)
PE2: {fg: EDITOR_CURRENTLINE, bg: EDITOR_BACKGROUND, greater_than: PE3}
PE3: {fg: EDITOR_CURRENTCELL, bg: EDITOR_BACKGROUND, greater_than: PE4}
PE4: {fg: EDITOR_SIDEAREAS, bg: EDITOR_BACKGROUND, min_ratio: 1.1}
PE5A: {fg: EDITOR_NORMAL, line_bg: COLOR_OCCURRENCE_4, bg: EDITOR_BACKGROUND, fg_lbg_min: 3,
  lbg_bg_min: 2, fg_bg_min: 9}
PE5B: {fg: EDITOR_NORMAL, line_bg: EDITOR_OCCURRENCE, bg: EDITOR_BACKGROUND, fg_lbg_min: 4,
  lbg_bg_min: 1.2, fg_bg_min: 9}
PE5C: {fg: EDITOR_NORMAL, line_bg: COLOR_ACCENT_2, bg: EDITOR_BACKGROUND, fg_lbg_min: 5,
  lbg_bg_min: 1.2, fg_bg_min: 9}
PE6: {fg: EDITOR_CTRLCLICK, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE7: {fg: EDITOR_MATCHED_P, bg: EDITOR_BACKGROUND, min_ratio: 1.2}
PE8: {fg: EDITOR_UNMATCHED_P, bg: EDITOR_BACKGROUND, min_ratio: 2}
PE9: {fg: EDITOR_KEYWORD, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE10: {fg: EDITOR_DEFINITION, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE11: {fg: EDITOR_BUILTIN, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE12: {fg: EDITOR_INSTANCE, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE13: {fg: EDITOR_NUMBER, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE14: {fg: EDITOR_MAGIC, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE15: {fg: EDITOR_COMMENT, bg: EDITOR_BACKGROUND, min_ratio: 2}
PE16: {fg: EDITOR_STRING, bg: EDITOR_BACKGROUND, min_ratio: 3}
PE17: {fg: COLOR_ERROR_1, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE18: {fg: COLOR_WARN_2, bg: EDITOR_BACKGROUND, min_ratio: 2.5}
PE19: {fg: ICON_7, bg: EDITOR_BACKGROUND, min_ratio: 3}
PE20: {fg: ICON_3, bg: EDITOR_BACKGROUND, min_ratio: 5}
PE21: {fg: ICON_4, bg: EDITOR_BACKGROUND, min_ratio: 3.5}
PE22: {fg: COLOR_ERROR_1, bg: EDITOR_BACKGROUND, min_ratio: 3, fg_opacity: 0.75}
PB1: {fg: COLOR_BACKGROUND_6, bg: COLOR_BACKGROUND_4, min_ratio: 1.2}
PB2: {fg: COLOR_BACKGROUND_6, bg: COLOR_BACKGROUND_2, min_ratio: 1.5, greater_than: PB3}
PB3: {fg: COLOR_BACKGROUND_5, bg: COLOR_BACKGROUND_3, greater_than: PB4, tolerance: 0.3}
PB4: {fg: COLOR_BACKGROUND_4, bg: COLOR_BACKGROUND_1, greater_than: PB5, tolerance: 0.3}
PB5: {fg: COLOR_BACKGROUND_3, bg: COLOR_BACKGROUND_1, greater_than: PB6}
PB6: {fg: COLOR_BACKGROUND_2, bg: COLOR_BACKGROUND_1, min_ratio: 1}
# PT chain ordered by actual Spyder light contrast: PT1 > PT4 > PT2 > PT3 > PT5 > PT6
PT1: {fg: COLOR_TEXT_1, bg: COLOR_BACKGROUND_1, min_ratio: 7, greater_than: PT4}
PT4: {fg: COLOR_TEXT_1, bg: COLOR_BACKGROUND_4, greater_than: PT2, tolerance: 1.5}
PT2: {fg: COLOR_TEXT_3, bg: COLOR_BACKGROUND_1, greater_than: PT3, tolerance: 0.5}
PT3: {fg: COLOR_TEXT_4, bg: COLOR_BACKGROUND_1, greater_than: PT5, tolerance: 1.0}
PT5: {fg: COLOR_TEXT_3, bg: COLOR_BACKGROUND_4, greater_than: PT6, tolerance: 0.5}
PT6: {fg: COLOR_TEXT_4, bg: COLOR_BACKGROUND_4, min_ratio: 1.2}
PA1: {fg: COLOR_ACCENT_3, bg: COLOR_BACKGROUND_1, min_ratio: 1.2}
PA2: {fg: COLOR_ACCENT_4, bg: COLOR_BACKGROUND_1, min_ratio: 2, greater_than: PA1}
PA3: {fg: COLOR_ACCENT_5, bg: COLOR_BACKGROUND_1, min_ratio: 2, greater_than: PA2}
PA4: {fg: COLOR_ACCENT_4, bg: COLOR_BACKGROUND_4, min_ratio: 1.2}
PA5: {fg: COLOR_ACCENT_5, bg: COLOR_BACKGROUND_4, min_ratio: 1.5}
PA6: {fg: COLOR_ACCENT_4, bg: COLOR_BACKGROUND_5, min_ratio: 1.2}
PA7: {fg: COLOR_ACCENT_5, bg: COLOR_BACKGROUND_5, min_ratio: 1.5}
PI1: {fg: ICON_1, bg: COLOR_BACKGROUND_4, min_ratio: 3}
PI2: {fg: ICON_2, bg: COLOR_BACKGROUND_4, min_ratio: 2}
PI3: {fg: ICON_3, bg: COLOR_BACKGROUND_4, min_ratio: 3}
PI4: {fg: ICON_4, bg: COLOR_BACKGROUND_4, min_ratio: 2}
PI5: {fg: ICON_5, bg: COLOR_BACKGROUND_4, min_ratio: 1.5}
PI6: {fg: ICON_6, bg: COLOR_BACKGROUND_4, min_ratio: 1.2}
PI7: {fg: ICON_7, bg: COLOR_BACKGROUND_4, min_ratio: 1.5}
PI8: {fg: COLOR_DISABLED, bg: COLOR_BACKGROUND_4, min_ratio: 1, max_ratio: 4}
PI9: {fg: ICON_1, bg: COLOR_BACKGROUND_1, min_ratio: 7}
PI10: {fg: ICON_2, bg: COLOR_BACKGROUND_1, min_ratio: 3}
PI11: {fg: ICON_3, bg: COLOR_BACKGROUND_1, min_ratio: 3}
PI12: {fg: ICON_4, bg: COLOR_BACKGROUND_1, min_ratio: 3}
PI13: {fg: ICON_5, bg: COLOR_BACKGROUND_1, min_ratio: 2}
PI14: {fg: ICON_6, bg: COLOR_BACKGROUND_1, min_ratio: 1.2}
PI15: {fg: ICON_7, bg: COLOR_BACKGROUND_1, min_ratio: 3}
PI16: {fg: COLOR_DISABLED, bg: COLOR_BACKGROUND_1, min_ratio: 1, max_ratio: 4}
PG:
  fg: COLOR_TEXT_1
  bg_base: COLOR_BACKGROUND_1
  bg_overlays:
    - GROUP_1
    - GROUP_2
    - GROUP_3
    - GROUP_4
    - GROUP_5
    - GROUP_6
    - GROUP_7
    - GROUP_8
    - GROUP_9
    - GROUP_10
    - GROUP_11
    - GROUP_12
  bg_blend: 0.5
  min_ratio: 5
